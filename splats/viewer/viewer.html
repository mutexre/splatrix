<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaussian Splat Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        #viewer-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #info {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 10px;
            border-radius: 5px; font-size: 11px; z-index: 1000;
        }
        #controls {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 10px;
            border-radius: 5px; font-size: 12px; z-index: 1000;
        }
        .error { color: #ff5555; }
    </style>
</head>
<body>
    <div id="viewer-container"></div>

    <div id="controls">
        <div><strong>Controls:</strong></div>
        <div>&#8226; Left click: Set focal point</div>
        <div>&#8226; Left drag: Rotate</div>
        <div>&#8226; Right drag: Pan</div>
        <div>&#8226; Wheel: Zoom</div>
    </div>

    <div id="info">
        <div id="status">Ready</div>
        <div id="stats"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/",
            "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
        }
    }
    </script>

    <script type="module">
        import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

        const statusEl = document.getElementById('status');
        const statsEl  = document.getElementById('stats');
        const container = document.getElementById('viewer-container');

        const urlParams = new URLSearchParams(window.location.search);
        const plyPath   = urlParams.get('ply');

        // Camera hint from COLMAP reconstruction data
        const cx = parseFloat(urlParams.get('cx')) || 0;
        const cy = parseFloat(urlParams.get('cy')) || 0;
        const cz = parseFloat(urlParams.get('cz')) || 0;
        const radius = parseFloat(urlParams.get('r')) || 5;

        // Use explicit camera position from COLMAP if provided, else fallback
        const hasCamPos = urlParams.has('px');
        const camPos = hasCamPos
            ? [parseFloat(urlParams.get('px')), parseFloat(urlParams.get('py')), parseFloat(urlParams.get('pz'))]
            : [cx + radius * 1.05, cy - radius * 0.5, cz + radius * 1.05];

        if (!plyPath) {
            statusEl.textContent = 'No PLY loaded \u2014 run pipeline or open a project';
        } else {
            statusEl.textContent = 'Loading PLY\u2026';

            try {
                const viewer = new GaussianSplats3D.Viewer({
                    'rootElement': container,
                    'cameraUp': [0, -1, 0],
                    'initialCameraPosition': camPos,
                    'initialCameraLookAt': [cx, cy, cz],
                    'dynamicScene': false,
                    'sharedMemoryForWorkers': false,
                });

                viewer.addSplatScene(plyPath, {
                    'splatAlphaRemovalThreshold': 5,
                    'showLoadingUI': true,
                    'progressiveLoad': true,
                })
                .then(() => {
                    statusEl.textContent = 'Loaded';
                    // Try to get splat count from internal state
                    try {
                        const count = viewer.getSplatCount ? viewer.getSplatCount() : '?';
                        statsEl.textContent = 'Gaussians: ' + (typeof count === 'number' ? count.toLocaleString() : count);
                    } catch(e) {
                        statsEl.textContent = '';
                    }
                    viewer.start();
                })
                .catch(err => {
                    statusEl.textContent = 'Error loading PLY: ' + err.message;
                    statusEl.className = 'error';
                    console.error('PLY load error:', err);
                });

                // Expose for Qt bridge
                window.loadPLY = (path) => {
                    statusEl.textContent = 'Loading\u2026';
                    statsEl.textContent = '';
                    viewer.addSplatScene(path, {
                        'splatAlphaRemovalThreshold': 5,
                        'showLoadingUI': true,
                        'progressiveLoad': true,
                    })
                    .then(() => {
                        statusEl.textContent = 'Loaded';
                        try {
                            const count = viewer.getSplatCount ? viewer.getSplatCount() : '?';
                            statsEl.textContent = 'Gaussians: ' + (typeof count === 'number' ? count.toLocaleString() : count);
                        } catch(e) {}
                        viewer.start();
                    })
                    .catch(err => {
                        statusEl.textContent = 'Error: ' + err.message;
                        statusEl.className = 'error';
                    });
                };

            } catch(err) {
                statusEl.textContent = 'Viewer init error: ' + err.message;
                statusEl.className = 'error';
                console.error('Viewer init error:', err);
            }
        }

        // Resize handling
        addEventListener('resize', () => {
            // GaussianSplats3D.Viewer handles resize internally
        });
    </script>
</body>
</html>

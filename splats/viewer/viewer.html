<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaussian Splat Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #controls {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 10px;
            border-radius: 5px; font-size: 12px; z-index: 1000;
        }
        #info {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.7); padding: 10px;
            border-radius: 5px; font-size: 11px;
        }
        .error { color: #ff5555; }
    </style>
</head>
<body>
    <div id="canvas-container"><canvas id="canvas"></canvas></div>

    <div id="controls">
        <div><strong>Controls:</strong></div>
        <div>&#8226; Left drag: Rotate</div>
        <div>&#8226; Right drag: Pan</div>
        <div>&#8226; Wheel: Zoom</div>
    </div>

    <div id="info">
        <div id="status">Ready</div>
        <div id="stats"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

        const statusEl = document.getElementById('status');
        const statsEl  = document.getElementById('stats');
        const canvas   = document.getElementById('canvas');

        const urlParams = new URLSearchParams(window.location.search);
        const plyPath   = urlParams.get('ply');

        // ── Scene ──────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(devicePixelRatio);

        const controls = new OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 0.1;
        controls.maxDistance = 500;

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dLight.position.set(10, 10, 10);
        scene.add(dLight);
        scene.add(new THREE.GridHelper(10, 10, 0x444444, 0x222222));

        // ── PLY loader ─────────────────────────────────────────
        const loader = new THREE.PLYLoader();

        function showPLY(geometry) {
            scene.children = scene.children.filter(c => !(c instanceof THREE.Points));

            const n = geometry.attributes.position.count;
            statsEl.textContent = 'Gaussians: ' + n.toLocaleString();

            if (!geometry.attributes.color) {
                const c = new Float32Array(n * 3).fill(1.0);
                geometry.setAttribute('color', new THREE.BufferAttribute(c, 3));
            }

            const pts = new THREE.Points(geometry,
                new THREE.PointsMaterial({ size: 0.02, vertexColors: true, sizeAttenuation: true })
            );
            scene.add(pts);

            geometry.computeBoundingBox();
            const bb = geometry.boundingBox;
            const center = new THREE.Vector3(); bb.getCenter(center);
            pts.position.sub(center);

            const sz = bb.getSize(new THREE.Vector3());
            const m = Math.max(sz.x, sz.y, sz.z);
            camera.position.set(m, m * 0.5, m);
            controls.target.set(0, 0, 0);
            controls.update();
            statusEl.textContent = 'Loaded';
        }

        if (!plyPath) {
            statusEl.textContent = 'No PLY loaded \u2014 run pipeline or open a project';
        } else {
            statusEl.textContent = 'Loading PLY\u2026';
            loader.load(plyPath, showPLY,
                xhr => { if (xhr.total) statusEl.textContent = 'Loading: ' + (xhr.loaded/xhr.total*100).toFixed(1) + '%'; },
                err => { statusEl.textContent = 'Error: ' + err.message; statusEl.className = 'error'; }
            );
        }

        // ── Animate ────────────────────────────────────────────
        (function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        })();

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        // Qt bridge
        window.loadPLY = path => {
            statusEl.textContent = 'Loading\u2026'; statsEl.textContent = '';
            loader.load(path, showPLY);
        };
    </script>
</body>
</html>
